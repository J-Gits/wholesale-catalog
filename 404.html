<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // GitHub Pages SPA redirect: convert path to query param, redirect to index
    var path = window.location.pathname;
    window.location.replace(window.location.origin + '/?p=' + encodeURIComponent(path));
  </script>
</head>
<body></body>
</html>
